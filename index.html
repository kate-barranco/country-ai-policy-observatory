  "41067":"Employee-only","42003":"Resident-mentioned","47037":"Resident-mentioned",
  "48157":"Employee-only","48185":"Employee-only","48265":"Employee-only",
  "49035":"Resident-mentioned","49057":"Employee-only","51760":"Resident-facing",
  "53025":"Employee-only","53063":"Employee-only","55045":"Employee-only","55079":"Employee-only"
};
function residentFacingTier(p) { return RF_MAP[p.fips] || 'Employee-only'; }


function bssColor(score) {
  if (score === null) return '#c8c4bc';
  const colors = ['#4ade80','#a3e635','#fbbf24','#fb923c','#ef4444','#991b1b'];
  return colors[score] || colors[5];
}

function postureColor(p) {
  if (!p || !p.posture) return '#c8c4bc';
  return POSTURE_COLORS[p.posture] || '#c8c4bc';
}

function postureBadgeStyle(posture) {
  const c = POSTURE_COLORS[posture];
  if (!c) return '';
  return `background:${c}22;color:${c === '#22c55e' || c === '#84cc16' ? '#166534' : c === '#ef4444' || c === '#a855f7' ? '#fff' : '#1a1814'};border:1px solid ${c}44;`;
}

function getLensColor(fips) {
  const p = getPolicyByFips(fips);
  if (!p) return '#e5e2db';
  const analyzed = p.posture || p.policy_type || p.coverage;
  if (currentLens === 'posture') {
    if (!analyzed) return '#c8c4bc';
    return postureColor(p);
  }
  if (currentLens === 'policy_type') {
    return POLICY_TYPE_COLORS[p.policy_type] || '#c8c4bc';
  }
  if (currentLens === 'equity') {
    const e = (p.equity_bias_language||'').toLowerCase();
    if (!analyzed) return '#c8c4bc';
    if (!e || e === 'none') return '#fecaca';
    if (e.includes('substantive') || e.includes('explicit') || e.includes('prohibit')) return '#16a34a';
    return '#fbbf24';
  }
  if (currentLens === 'resident') {
    if (!analyzed) return '#c8c4bc';
    const tier = residentFacingTier(p);
    if (tier === 'Resident-facing') return '#22c55e';
    if (tier === 'Resident-mentioned') return '#eab308';
    return '#ef4444';
  }
  if (currentLens === 'blind_spot') {
    const s = blindSpotScore(p);
    if (s === null) return '#c8c4bc';
    return bssColor(s);
  }
  if (currentLens === 'domains') {
    if (!analyzed) return '#c8c4bc';
    const d = (p.high_risk_domains||'').trim();
    if (!d) return '#fecaca';
    const count = d.split(',').filter(x=>x.trim()).length;
    const scale = ['#dbeafe','#93c5fd','#3b82f6','#1d4ed8','#1e3a8a'];
    return scale[Math.min(count-1, 4)] || scale[0];
  }
  if (currentLens === 'year') {
    const y = parseInt((p.adoption_date||'').slice(0,4));
    if (!y || isNaN(y)) return '#c8c4bc';
    const yScale = {2022:'#dbeafe',2023:'#93c5fd',2024:'#3b82f6',2025:'#1d4ed8',2026:'#1e3a8a'};
    return yScale[y] || '#c8c4bc';
  }
  if (currentLens === 'accountability') {
    if (!analyzed) return '#c8c4bc';
    const acc = (p.accountability||'').toLowerCase();
    if (acc.includes('public') || acc.includes('website') || acc.includes('disclos')) return '#16a34a';
    if (acc.includes('audit') || acc.includes('oversight') || acc.includes('board') || acc.includes('commit')) return '#fbbf24';
    return '#fecaca';
  }
  return '#c8c4bc';
}

function getLegendItems() {
  if (currentLens === 'posture') return [
    ...Object.entries(POSTURE_COLORS).map(([k,c])=>({label:k,color:c})),
    {label:'Not yet analyzed',color:'#c8c4bc'},
    {label:'No policy',color:'#e5e2db'}
  ];
  if (currentLens === 'policy_type') return [
    ...Object.entries(POLICY_TYPE_COLORS).map(([k,c])=>({label:k.length>30?k.slice(0,28)+'…':k,color:c})),
    {label:'Unknown / Not analyzed',color:'#c8c4bc'},
    {label:'No policy',color:'#e5e2db'}
  ];
  if (currentLens === 'equity') return [
    {label:'Substantive equity language',color:'#16a34a'},
    {label:'Thin / partial',color:'#fbbf24'},
    {label:'None',color:'#fecaca'},
    {label:'Not analyzed',color:'#c8c4bc'},
    {label:'No policy',color:'#e5e2db'}
  ];
  if (currentLens === 'resident') return [
    {color:'#22c55e', label:'Resident-facing (actual rights/protections)'},
    {color:'#eab308', label:'Resident-mentioned (reference only, no rights)'},
    {color:'#ef4444', label:'Employee-only (residents invisible)'},
    {color:'#e5e2db', label:'No policy tracked'},
  ];
  if (currentLens === 'blind_spot') return [
    {label:'Score 0 — most mature',color:'#4ade80'},
    {label:'Score 1',color:'#a3e635'},
    {label:'Score 2',color:'#fbbf24'},
    {label:'Score 3',color:'#fb923c'},
    {label:'Score 4',color:'#ef4444'},
    {label:'Score 5 — most gaps',color:'#991b1b'},
    {label:'Not analyzed',color:'#c8c4bc'},
    {label:'No policy',color:'#e5e2db'}
  ];
  if (currentLens === 'domains') return [
    {label:'1 domain named',color:'#dbeafe'},
    {label:'2 domains',color:'#93c5fd'},
    {label:'3 domains',color:'#3b82f6'},
    {label:'4+ domains',color:'#1d4ed8'},
    {label:'None named',color:'#fecaca'},
    {label:'No policy',color:'#e5e2db'}
  ];
  if (currentLens === 'year') return [
    {label:'2022',color:'#dbeafe'},{label:'2023',color:'#93c5fd'},
    {label:'2024',color:'#3b82f6'},{label:'2025',color:'#1d4ed8'},
    {label:'2026',color:'#1e3a8a'},{label:'Date unknown',color:'#c8c4bc'}
  ];
  if (currentLens === 'accountability') return [
    {label:'Public accountability',color:'#16a34a'},
    {label:'Governance body / audit',color:'#fbbf24'},
    {label:'Minimal / IT only',color:'#fecaca'},
    {label:'Not analyzed',color:'#c8c4bc'},
    {label:'No policy',color:'#e5e2db'}
  ];
  return [];
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
async function initMap() {
  const container = document.getElementById('map-svg');
  const W = container.clientWidth || 900;
  const H = container.clientHeight || 580;
  const svg = d3.select('#map-svg').attr('viewBox', `0 0 ${W} ${H}`);
  mapSvg = svg;
  const zoom = d3.zoom().scaleExtent([1, 12])
    .on('zoom', e => mapG.attr('transform', e.transform));
  svg.call(zoom);
  const g = svg.append('g');
  mapG = g;

  try {
    usGeo = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json');
  } catch(e) {
    g.append('text').attr('x', W/2).attr('y', H/2)
      .attr('text-anchor','middle').attr('font-family','Syne,sans-serif').attr('font-size',13)
      .text('Map data unavailable — check network connection');
    return;
  }

  const policyFips = new Set(db.map(p => p.fips));
  const projection = d3.geoAlbersUsa().fitSize([W, H],
    topojson.feature(usGeo, usGeo.objects.nation));
  const path = d3.geoPath().projection(projection);

  g.append('g').selectAll('path')
    .data(topojson.feature(usGeo, usGeo.objects.counties).features)
    .join('path')
    .attr('class', d => `county${policyFips.has(d.id) ? ' has-policy' : ''}`)
    .attr('d', path)
    .attr('fill', d => policyFips.has(d.id) ? getLensColor(d.id) : '#e5e2db')
    .attr('data-fips', d => d.id)
    .on('mousemove', (event, d) => showTooltip(event, d.id))
    .on('mouseleave', hideTooltip)
    .on('click', (event, d) => { if (policyFips.has(d.id)) openDetail(d.id); });

  g.append('path').datum(topojson.mesh(usGeo, usGeo.objects.states, (a,b)=>a!==b))
    .attr('class','state-borders').attr('d', path);

  countyPaths = g.selectAll('.county');
  renderLegend();
}

function updateMapColors() {
  if (!countyPaths) return;
  const policyFips = new Set(db.map(p => p.fips));
  countyPaths.attr('fill', d => policyFips.has(d.id) ? getLensColor(d.id) : '#e5e2db');
  renderLegend();
}

function renderLegend() {
  const el = document.getElementById('map-legend');
  const items = getLegendItems();
  el.innerHTML = `<div class="legend-head">${currentLens.replace('_',' ')}</div>` +
    items.map(i => `<div class="legend-row"><div class="l-swatch" style="background:${i.color}"></div>${i.label}</div>`).join('');
}

function showTooltip(event, fips) {
  const p = getPolicyByFips(fips);
  if (!p) return;
  const tt = document.getElementById('map-tooltip');
  const badge = p.posture ? `<div class="tt-badge" style="${postureBadgeStyle(p.posture)}">${p.posture}</div>` : '';
  const bl = p.bottom_line ? `<div class="tt-text">${p.bottom_line.slice(0,100)}…</div>` : `<div class="tt-text" style="color:#6a6560">Not yet analyzed — click to add data</div>`;
  tt.innerHTML = `<div class="tt-name">${p.county_name}</div><div class="tt-state">${p.state}</div>${badge}${bl}`;
  const rect = document.querySelector('.map-wrap').getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 10;
  if (x + 230 > rect.width) x = event.clientX - rect.left - 230;
  tt.style.left = x + 'px'; tt.style.top = y + 'px'; tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('map-tooltip').style.display = 'none';
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
function openDetail(fips) {
  selectedFips = fips;
  const p = getPolicyByFips(fips);
  if (!p) return;
  document.getElementById('dp-county').textContent = p.county_name;
  document.getElementById('dp-state').textContent = p.state;

  let html = '';

  // Special flags
  if (fips === '08123') html += `<div class="dp-flag flag-weld">★ Only county with mandatory public AI registry</div><br>`;
  if (p.bottom_line && p.bottom_line.includes('sunset')) html += `<div class="dp-flag flag-warn">⚠ Governance cliff: advisory body sunsets Dec 31, 2026</div><br>`;
  if ((p.key_prohibitions||'').toLowerCase().includes('carve') || (p.bottom_line||'').toLowerCase().includes('carve')) html += `<div class="dp-flag flag-warn">⚠ Law enforcement carve-out present</div><br>`;

  // BSS
  const bss = blindSpotScore(p);
  if (bss !== null) {
    html += `<div class="dp-field"><div class="dp-label">Civic Blind Spot Score</div>
    <div class="dp-value"><div class="bss-bar">
      ${[0,1,2,3,4].map(i=>`<div class="bss-pip${i<bss?' on':''}"></div>`).join('')}
    </div><span style="font-family:Syne,sans-serif;font-size:10px;color:var(--muted);margin-top:3px;display:block">${bss}/5 gaps</span></div></div>`;
  }

  if (p.posture) {
    html += `<div class="dp-field"><div class="dp-label">Posture</div>
    <div class="dp-value"><span class="posture-badge" style="${postureBadgeStyle(p.posture)}">${p.posture}</span></div></div>`;
  }

  // Resident-facing tier badge
  const rft = residentFacingTier(p);
  const rftColor = {'Resident-facing':'#22c55e','Resident-mentioned':'#eab308','Employee-only':'#ef4444'};
  html += `<div class="dp-field"><div class="dp-label">Resident-Facing Tier</div>
  <div class="dp-value"><span class="posture-badge" style="background:${rftColor[rft]}20;color:${rftColor[rft]};border:1px solid ${rftColor[rft]}40">${rft}</span></div></div>`;

  FIELDS_DISPLAY.filter(f => f.key !== 'posture').forEach(f => {
    const v = p[f.key];
    if (!v && !['policy_type','adoption_date','coverage','equity_bias_language','accountability'].includes(f.key)) return;
    html += `<div class="dp-field"><div class="dp-label">${f.label}</div>
    <div class="dp-value">${v || '<span style="color:var(--muted);font-style:italic">Not analyzed</span>'}</div></div>`;
  });

  html += `<div class="dp-field dp-link"><div class="dp-label">Source Document</div>
  <a href="${p.url}" target="_blank" rel="noopener">${p.url.slice(0,60)}…</a></div>`;

  document.getElementById('dp-body').innerHTML = html;
  document.getElementById('dp-edit-btn').onclick = () => openEditForm(fips);
  document.getElementById('dp-link-btn').onclick = () => window.open(p.url, '_blank');
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedFips = null;
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
  currentView = name;
  if (name === 'dashboard') renderDashboard();
  if (name === 'timeline') renderTimeline();
  if (name === 'patterns') renderPatterns();
  if (name === 'discovery') renderDiscovery();
  if (name === 'add' && !editingFips) renderAddForm();
  if (name === 'compare') populateCompareSelect();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const analyzed = db.filter(p => p.posture || p.policy_type);
  const total = db.length;
  const withEquity = db.filter(p => p.equity_bias_language && p.equity_bias_language.toLowerCase() !== 'none' && p.equity_bias_language.trim());
  const withResident = db.filter(p => residentFacingTier(p) === 'Resident-facing');
  const withDomains = db.filter(p => p.high_risk_domains && p.high_risk_domains.trim());
  const withPublicAcc = db.filter(p => (p.accountability||'').toLowerCase().includes('public') || (p.accountability||'').toLowerCase().includes('website'));
  const withLECarve = db.filter(p => (p.bottom_line||'').toLowerCase().includes('carve') || (p.key_prohibitions||'').toLowerCase().includes('carve'));
  const states = [...new Set(db.map(p=>p.state))].length;

  // Posture dist
  const postureCounts = {};
  POSTURE_OPTIONS.forEach(o => postureCounts[o] = db.filter(p => p.posture === o).length);

  // Policy type dist
  const typeCounts = {};
  POLICY_TYPE_OPTIONS.forEach(o => typeCounts[o] = db.filter(p => p.policy_type === o).length);

  // Year dist
  const yearCounts = {};
  db.forEach(p => {
    const y = (p.adoption_date||'').slice(0,4);
    if (y && !isNaN(y)) yearCounts[y] = (yearCounts[y]||0) + 1;
  });

  const pct = (n) => total ? Math.round(n/total*100) : 0;

  function barChart(title, data, colorFn) {
    const max = Math.max(...Object.values(data), 1);
    return `<div class="chart-box"><div class="chart-title">${title}</div>` +
      Object.entries(data).filter(([,v])=>v>0).map(([k,v]) =>
        `<div class="bar-row">
          <div class="bar-label">${k.length>28?k.slice(0,26)+'…':k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%;background:${colorFn(k)}"></div></div>
          <div class="bar-val">${v}</div>
        </div>`
      ).join('') + '</div>';
  }

  document.getElementById('dash-inner').innerHTML = `
    <div style="padding:20px;display:flex;flex-direction:column;gap:18px;">
      <div>
        <div class="dash-section-title">At a Glance</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-n">${total}</div><div class="stat-l">Counties tracked</div></div>
          <div class="stat-card"><div class="stat-n">${analyzed.length}</div><div class="stat-l">Fully analyzed</div></div>
          <div class="stat-card"><div class="stat-n">${states}</div><div class="stat-l">States represented</div></div>
          <div class="stat-card"><div class="stat-n">${pct(withEquity.length)}%</div><div class="stat-l">Substantive equity language</div></div>
          <div class="stat-card"><div class="stat-n">${pct(withResident.length)}%</div><div class="stat-l">Resident-facing coverage</div></div>
          <div class="stat-card"><div class="stat-n">${pct(withDomains.length)}%</div><div class="stat-l">High-risk domains named</div></div>
          <div class="stat-card"><div class="stat-n">${pct(withPublicAcc.length)}%</div><div class="stat-l">Public accountability mechanism</div></div>
          <div class="stat-card"><div class="stat-n">${withLECarve.length}</div><div class="stat-l">Law enforcement carve-outs</div></div>
        </div>
      </div>
      <div class="chart-row">
        ${barChart('Posture Distribution', postureCounts, k => POSTURE_COLORS[k]||'#c8c4bc')}
        ${barChart('Policy Type Distribution', typeCounts, k => POLICY_TYPE_COLORS[k]||'#c8c4bc')}
      </div>
      <div class="chart-row">
        ${barChart('Adoption by Year', yearCounts, () => '#3b82f6')}
        <div class="chart-box"><div class="chart-title">High-Risk Domain Coverage</div>
          ${['Elections','Law Enforcement','Benefits','Health','HR','Legal'].map(d => {
            const n = db.filter(p => (p.high_risk_domains||'').toLowerCase().includes(d.toLowerCase())).length;
            return `<div class="bar-row"><div class="bar-label">${d}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${n/Math.max(total,1)*100}%;background:#818cf8"></div></div>
              <div class="bar-val">${n}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

// ─── TIMELINE ─────────────────────────────────────────────────────────────────
function renderTimeline() {
  const dated = db.filter(p => p.adoption_date && p.adoption_date !== 'not listed').sort((a,b) => a.adoption_date.localeCompare(b.adoption_date));
  const undated = db.filter(p => !p.adoption_date || p.adoption_date === 'not listed');
  const byYear = {};
  dated.forEach(p => {
    const y = p.adoption_date.slice(0,4);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(p);
  });

  let html = '<div style="padding:20px;">';
  Object.entries(byYear).sort().forEach(([year, policies]) => {
    html += `<div class="tl-year-block"><div class="tl-year-head">${year}</div>`;
    policies.forEach(p => {
      const badge = p.posture ? `<span class="posture-badge" style="${postureBadgeStyle(p.posture)};font-size:8px;padding:1px 6px;margin-left:6px;">${p.posture}</span>` : '';
      html += `<div class="tl-entry" onclick="openDetailFromTimeline('${p.fips}')">
        <div class="tl-date">${p.adoption_date}</div>
        <div class="tl-info">
          <div class="tl-name">${p.county_name}, ${p.state} ${badge}</div>
          <div class="tl-bottom">${p.bottom_line || p.title}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  if (undated.length) {
    html += `<div class="tl-year-block"><div class="tl-year-head" style="font-size:18px">Date Not Listed</div>`;
    undated.forEach(p => {
      html += `<div class="tl-entry" onclick="openDetailFromTimeline('${p.fips}')">
        <div class="tl-date">—</div>
        <div class="tl-info"><div class="tl-name">${p.county_name}, ${p.state}</div>
        <div class="tl-bottom">${p.bottom_line || p.title}</div></div>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('tl-inner').innerHTML = html;
}

function openDetailFromTimeline(fips) {
  switchView('map');
  setTimeout(() => openDetail(fips), 100);
}

// ─── COMPARE ──────────────────────────────────────────────────────────────────
function populateCompareSelect() {
  const sel = document.getElementById('compare-select');
  sel.innerHTML = db.map(p => `<option value="${p.fips}">${p.county_name}, ${p.state}</option>`).join('');
}

function renderCompare() {
  const sel = document.getElementById('compare-select');
  const chosen = [...sel.selectedOptions].map(o => getPolicyByFips(o.value)).filter(Boolean);
  if (chosen.length < 2) {
    document.getElementById('compare-table-wrap').innerHTML = '<p class="empty-state" style="padding:16px">Select 2–6 counties to compare.</p>';
    return;
  }

  const rows = [
    {key:'policy_type',label:'Policy Type'},
    {key:'posture',label:'Posture'},
    {key:'adoption_date',label:'Adoption Date'},
    {key:'coverage',label:'Coverage'},
    {key:'equity_bias_language',label:'Equity Language'},
    {key:'high_risk_domains',label:'High-Risk Domains'},
    {key:'key_prohibitions',label:'Key Prohibitions'},
    {key:'key_requirements',label:'Key Requirements'},
    {key:'accountability',label:'Accountability'},
    {key:'bottom_line',label:'Bottom Line'},
  ];

  let html = `<table class="compare-table"><thead><tr><th class="row-label">Field</th>
    ${chosen.map(p=>`<th>${p.county_name}<br><span style="font-weight:400;opacity:.7">${p.state}</span></th>`).join('')}
  </tr></thead><tbody>`;

  const diffs = [];
  rows.forEach(r => {
    const vals = chosen.map(p => p[r.key]||'');
    const unique = new Set(vals);
    const isDiverge = unique.size > 1 && !vals.every(v=>!v);
    if (isDiverge) diffs.push(r.label);
    html += `<tr><td class="row-label">${r.label}</td>
      ${vals.map(v => `<td class="${isDiverge?'divergent':''}">${v||'<em style="color:var(--muted)">—</em>'}</td>`).join('')}
    </tr>`;
  });
  html += '</tbody></table>';

  document.getElementById('compare-table-wrap').innerHTML = html;
  document.getElementById('diff-summary').innerHTML = diffs.length
    ? `<strong style="font-family:Syne,sans-serif;">Key differences:</strong> ${diffs.join(' · ')}`
    : 'No significant differences detected in analyzed fields.';
}

function exportCompare() {
  const sel = document.getElementById('compare-select');
  const chosen = [...sel.selectedOptions].map(o => getPolicyByFips(o.value)).filter(Boolean);
  if (!chosen.length) return;
  const fields = ['county_name','state',...FIELDS_DISPLAY.map(f=>f.key)];
  const rows = [fields.join('\t'), ...chosen.map(p => fields.map(f=>p[f]||'').join('\t'))];
  downloadText(rows.join('\n'), 'compare.tsv');
}

// ─── PATTERNS ─────────────────────────────────────────────────────────────────
function renderPatterns() {
  const analyzed = db.filter(p => p.posture || p.policy_type || p.bottom_line);
  const total = db.length;
  const withEquity = db.filter(p => p.equity_bias_language && p.equity_bias_language.toLowerCase() !== 'none' && p.equity_bias_language.trim());
  const withResident = db.filter(p => residentFacingTier(p) === 'Resident-facing');
  const caCounties = db.filter(p => p.state === 'California');
  const caWithData = caCounties.filter(p => p.posture || p.policy_type);
  const bssScored = db.map(p => ({...p, bss: blindSpotScore(p)})).filter(p => p.bss !== null);
  const avgBss = bssScored.length ? (bssScored.reduce((s,p)=>s+p.bss,0)/bssScored.length).toFixed(1) : 'N/A';

  const cards = [
    {cls:'hi', head:'★ Gold Standard: Weld County, Colorado',
      body:`Weld County CO is the <strong>only policy in the entire dataset</strong> requiring a public-facing website listing all high-risk AI systems with mandatory discrimination risk management disclosures. No other county in the dataset has created a comparable public accountability mechanism. This is the benchmark every other jurisdiction should be measured against.`},
    {cls:'warn', head:'⚠ Live Governance Cliff: District of Columbia',
      body:`DC's AI Taskforce and Advisory Group are set to <strong>sunset December 31, 2026</strong> with no stated renewal mechanism. Unless action is taken before year-end, DC loses its primary AI governance body — with no successor institution defined.`},
    {cls:'warn', head:'⚠ Recurring Governance Gap: Law Enforcement Carve-Outs',
      body:`Law enforcement is explicitly carved out from policy coverage in <strong>El Dorado CA, Mendocino CA</strong>, and others. This is the single most consequential blind spot in county AI governance: the highest-stakes use of AI (policing, surveillance, pretrial risk scoring) is systematically excluded from the policies meant to govern it.`},
    {cls:'', head:'Elections Protection: Pinal County, Arizona Stands Alone',
      body:`Pinal AZ has the <strong>strongest elections language</strong> in the dataset — AI is explicitly barred from certified election equipment. No other county in the dataset matches this specificity. Given the stakes of AI in elections administration, this gap across the other 57 counties is notable.`},
    {cls:'info', head:'The Non-Binding Tension: Marin County, California',
      body:`Marin CA has the most resident-facing provisions of any policy reviewed — yet the document is <strong>non-binding guidelines</strong>. This creates a meaningful tension: the most protective language for residents has the weakest legal force. Comparing Marin to counties with binding policies but no resident-facing provisions illustrates the difference between aspiration and governance.`},
    {cls:'info', head:'California Cluster',
      body:`California has <strong>${caCounties.length} counties</strong> in the dataset — far more than any other state. ${caWithData.length} have been analyzed. Watch for state-level policy convergence: California counties may be responding to state-level guidance or shared legal counsel.`},
    {cls:'', head:'Internal Focus: The Dataset Default',
      body:`The overwhelming majority of policies reviewed so far are <strong>entirely internal-facing</strong> — governing employee use of AI, not what AI does to residents. The exceptions are Marin (non-binding), Inyo (informed consent), Monterey (automated decision prohibition), Sacramento (opt-out), San Joaquin (protected class prohibition), and Weld (public accountability). Six out of ${total} counties is ${Math.round(6/total*100)}% of the dataset.`},
    {cls:'', head:'Average Civic Blind Spot Score',
      body:`Of ${bssScored.length} analyzed counties, the average blind spot score is <strong>${avgBss}/5</strong>. A score of 5 means a county's policy has zero: resident-facing coverage, equity language, high-risk domain callouts, public accountability, or governance body. Most policies cluster in the 3–4 range.`},
    {cls:'warn', head:'Equity Language: Haves vs. Have-Nots',
      body:`Only <strong>${withEquity.length} of ${total}</strong> counties (${Math.round(withEquity.length/total*100)}%) have substantive equity or bias language. The majority either have no equity provisions or mention the concept without operational content. San Joaquin's explicit protected class prohibition is the strongest example.`},
  ];

  document.getElementById('patterns-inner').innerHTML = cards.map(c =>
    `<div class="insight-card ${c.cls}"><div class="insight-head">${c.head}</div><div class="insight-body">${c.body}</div></div>`
  ).join('');
}

// ─── DISCOVERY ────────────────────────────────────────────────────────────────
document.querySelectorAll('.disc-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.disc-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.disc-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('disc-' + tab.dataset.disc).classList.add('active');
    renderDiscoveryPanel(tab.dataset.disc);
  });
});

function renderDiscovery() { renderDiscoveryPanel('blindspot'); }

function renderDiscoveryPanel(name) {
  if (name === 'blindspot') renderBlindSpot();
  if (name === 'govgap') renderGovGap();
  if (name === 'wave') renderWave();
  if (name === 'similar') renderSimilar();
  if (name === 'heatmap') renderHeatmap();
}

function renderBlindSpot() {
  const scored = db.map(p => ({...p, bss: blindSpotScore(p)})).filter(p=>p.bss!==null).sort((a,b)=>b.bss-a.bss);
  const el = document.getElementById('disc-blindspot');
  el.innerHTML = `<h3 style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;margin-bottom:6px;">Civic Blind Spot Score</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic;">0–5 score per county. One point for each missing: resident coverage, equity language, high-risk domain callouts, public accountability, governance body beyond IT.</p>
  ${scored.length === 0 ? '<p class="empty-state">No counties analyzed yet.</p>' :
    scored.map(p => {
      const pips = [0,1,2,3,4].map(i=>`<div class="bss-pip${i<p.bss?' on':''}"></div>`).join('');
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDetailFromTimeline('${p.fips}')">
        <div style="width:140px;font-family:Syne,sans-serif;font-size:11px;font-weight:600;">${p.county_name}, ${p.state}</div>
        <div class="bss-bar">${pips}</div>
        <div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;color:${bssColor(p.bss)}">${p.bss}/5</div>
      </div>`;
    }).join('')
  }`;
}

function renderGovGap() {
  const gaps = [
    {label:'Law enforcement carve-out', counties: db.filter(p=>(p.bottom_line||'').toLowerCase().includes('carve')||(p.key_prohibitions||'').toLowerCase().includes('carve'))},
    {label:'No resident-facing coverage', counties: db.filter(p=>p.posture && residentFacingTier(p) === 'Employee-only')},
    {label:'No equity language', counties: db.filter(p=>p.posture && (!p.equity_bias_language || p.equity_bias_language.toLowerCase()==='none' || !p.equity_bias_language.trim()))},
    {label:'No high-risk domains named', counties: db.filter(p=>p.posture && (!p.high_risk_domains||!p.high_risk_domains.trim()))},
    {label:'No public accountability', counties: db.filter(p=>p.posture && !(p.accountability||'').toLowerCase().includes('public') && !(p.accountability||'').toLowerCase().includes('website'))},
  ];
  document.getElementById('disc-govgap').innerHTML = `<h3 style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;margin-bottom:16px;">Governance Gap Analysis</h3>` +
    gaps.map(g => `<div style="margin-bottom:18px;">
      <div style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">${g.label} (${g.counties.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${g.counties.map(p=>
        `<span class="tag" style="background:var(--surface);border:1px solid var(--border);cursor:pointer;" onclick="openDetailFromTimeline('${p.fips}')">${p.county_name}</span>`
      ).join('')||'<span style="font-size:12px;color:var(--muted);font-style:italic">None identified yet</span>'}</div>
    </div>`).join('');
}

function renderWave() {
  const dated = db.filter(p=>p.adoption_date && p.adoption_date!=='not listed').sort((a,b)=>a.adoption_date.localeCompare(b.adoption_date));
  const el = document.getElementById('disc-wave');
  if (!dated.length) { el.innerHTML = '<p class="empty-state">No adoption dates available yet.</p>'; return; }

  let html = `<h3 style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;margin-bottom:6px;">Adoption Wave</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic;">Policies in chronological order — shows the spread of AI governance over time.</p>`;

  let running = 0;
  const byMonth = {};
  dated.forEach(p => {
    const m = p.adoption_date.slice(0,7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(p);
  });

  Object.entries(byMonth).sort().forEach(([month, policies]) => {
    running += policies.length;
    html += `<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;">
      <div style="font-family:Syne,sans-serif;font-size:10px;font-weight:600;color:var(--muted);min-width:70px;padding-top:2px;">${month}</div>
      <div style="flex:1">
        ${policies.map(p=>`<div style="font-family:Syne,sans-serif;font-size:11px;font-weight:600;margin-bottom:2px;cursor:pointer;" onclick="openDetailFromTimeline('${p.fips}')">${p.county_name}, ${p.state}</div>`).join('')}
      </div>
      <div style="font-family:Syne,sans-serif;font-size:10px;color:var(--muted);padding-top:2px;">${running} total</div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderSimilar() {
  const el = document.getElementById('disc-similar');
  const analyzed = db.filter(p => p.posture);
  if (!analyzed.length) { el.innerHTML = '<p class="empty-state">No analyzed counties yet.</p>'; return; }

  function similarity(a, b) {
    let score = 0;
    if (a.posture && a.posture === b.posture) score += 3;
    if (a.policy_type && a.policy_type === b.policy_type) score += 2;
    const ae = !a.equity_bias_language || a.equity_bias_language.toLowerCase()==='none';
    const be = !b.equity_bias_language || b.equity_bias_language.toLowerCase()==='none';
    if (ae === be) score += 1;
    const ar = residentFacingTier(a) === 'Resident-facing';
    const br = residentFacingTier(b) === 'Resident-facing';
    if (ar === br) score += 2;
    return score;
  }

  el.innerHTML = `<h3 style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;margin-bottom:6px;">Most Similar County Finder</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:14px;font-style:italic;">Select a county to find the 3 most similar policies based on posture, type, equity, and resident-facing coverage.</p>
  <select id="sim-select" style="font-family:Syne,sans-serif;font-size:11px;padding:6px 8px;border:1px solid var(--border);background:var(--surface);width:300px;" onchange="showSimilar(this.value)">
    <option value="">— select a county —</option>
    ${analyzed.map(p=>`<option value="${p.fips}">${p.county_name}, ${p.state}</option>`).join('')}
  </select>
  <div id="sim-results" style="margin-top:14px;"></div>`;
}

window.showSimilar = function(fips) {
  if (!fips) return;
  const base = getPolicyByFips(fips);
  const others = db.filter(p => p.fips !== fips && p.posture);
  const ranked = others.map(p => ({...p, sim: similarity_score(base, p)})).sort((a,b)=>b.sim-a.sim).slice(0,3);
  function similarity_score(a,b) {
    let s=0;
    if(a.posture===b.posture) s+=3;
    if(a.policy_type===b.policy_type) s+=2;
    const ae=!a.equity_bias_language||a.equity_bias_language.toLowerCase()==='none';
    const be=!b.equity_bias_language||b.equity_bias_language.toLowerCase()==='none';
    if(ae===be) s+=1;
    const ar=residentFacingTier(a) === 'Resident-facing';
    const br=residentFacingTier(b) === 'Resident-facing';
    if(ar===br) s+=2;
    return s;
  }
  document.getElementById('sim-results').innerHTML = ranked.map(p =>
    `<div style="padding:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;" onclick="openDetailFromTimeline('${p.fips}')">
      <div style="font-family:Syne,sans-serif;font-size:12px;font-weight:700;">${p.county_name}, ${p.state}</div>
      <div style="font-family:Syne,sans-serif;font-size:10px;color:var(--muted);margin-top:3px;">Similarity: ${p.sim}/8 · ${p.posture||'—'}</div>
      <div style="font-size:12px;font-style:italic;margin-top:4px;color:var(--muted)">${p.bottom_line||''}</div>
    </div>`
  ).join('');
};

function renderHeatmap() {
  const fields = FIELDS_DISPLAY.map(f => f.key);
  const labels = Object.fromEntries(FIELDS_DISPLAY.map(f=>[f.key,f.label]));
  const analyzed = db.filter(p => p.posture || p.policy_type || p.bottom_line);
  if (!analyzed.length) { document.getElementById('disc-heatmap').innerHTML = '<p class="empty-state">No analyzed counties yet.</p>'; return; }

  const emptyCounts = fields.map(f => ({
    field: f, label: labels[f],
    empty: analyzed.filter(p => !p[f] || p[f].trim()==='' || p[f]==='not listed').length,
    total: analyzed.length
  })).sort((a,b)=>b.empty-a.empty);

  document.getElementById('disc-heatmap').innerHTML = `<h3 style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;margin-bottom:6px;">Field Completeness Heatmap</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic;">Which fields are most commonly empty or missing across ${analyzed.length} analyzed counties — a policy gap indicator.</p>` +
  emptyCounts.map(({label, empty, total}) => {
    const pct = Math.round(empty/total*100);
    const color = pct>60?'#ef4444':pct>30?'#fb923c':'#22c55e';
    return `<div class="bar-row" style="margin-bottom:8px;">
      <div class="bar-label" style="min-width:160px;">${label}</div>
      <div class="bar-track" style="height:10px;"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
      <div class="bar-val" style="min-width:50px;font-size:10px;">${empty}/${total} empty</div>
    </div>`;
  }).join('');
}

function openEditForm(fips) {
  editingFips = fips;
  const p = getPolicyByFips(fips);
  switchView('add');
  setTimeout(() => renderAddForm(p), 50);
}

function cancelEdit() {
  editingFips = null;
  renderAddForm();
}

function saveForm() {
  const get = id => document.getElementById(id)?.value?.trim()||'';
  const fips = get('f-fips');
  if (!fips) { alert('FIPS code is required.'); return; }

  const entry = {
    fips, county_name: get('f-county_name'), state: get('f-state'),
    title: get('f-title'), url: get('f-url'),
    adoption_date: get('f-adoption_date'), policy_type: get('f-policy_type'),
    posture: get('f-posture'), posture_notes: get('f-posture_notes'),
    coverage: get('f-coverage'), key_prohibitions: get('f-key_prohibitions'),
    key_requirements: get('f-key_requirements'), high_risk_domains: get('f-high_risk_domains'),
    equity_bias_language: get('f-equity_bias_language'),
    accountability: get('f-accountability'), bottom_line: get('f-bottom_line'),
  };

  const idx = db.findIndex(p => p.fips === fips);
  if (idx >= 0) db[idx] = {...db[idx], ...entry};
  else db.push(entry);

  saveDB();
  updateMapColors();
  updateHeaderCount();
  editingFips = null;

  // Show confirmation
  const notice = document.createElement('div');
  notice.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1a1814;color:#f5f3ee;font-family:Syne,sans-serif;font-size:11px;font-weight:700;padding:10px 16px;z-index:9999;letter-spacing:.05em;';
  notice.textContent = `✓ Saved: ${entry.county_name}, ${entry.state}`;
  document.body.appendChild(notice);
  setTimeout(() => notice.remove(), 3000);

  renderAddForm();
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportTSV() {
  const fields = ['fips','county_name','state','title','url','adoption_date','policy_type','posture','posture_notes','coverage','key_prohibitions','key_requirements','high_risk_domains','equity_bias_language','accountability','bottom_line'];
  const rows = [fields.join('\t'), ...db.map(p => fields.map(f=>String(p[f]||'').replace(/\t/g,' ')).join('\t'))];
  downloadText(rows.join('\n'), 'civic_ai_policies.tsv');
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
  a.download = filename;
  a.click();
}

// ─── HEADER COUNT ─────────────────────────────────────────────────────────────
function updateHeaderCount() {
  const analyzed = db.filter(p => p.posture || p.policy_type).length;
  document.getElementById('h-count').textContent = `${db.length} counties tracked · ${analyzed} analyzed`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadDB();
updateHeaderCount();
initMap();
