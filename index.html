<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic AI Policy Observatory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --border: #e0dbd2;
  --text: #1a1814;
  --muted: #6b6560;
  --accent: #f0c040;
  --nav-bg: #14120f;
  --c-permissive: #22c55e;
  --c-guardrails: #84cc16;
  --c-approval: #eab308;
  --c-risk: #f97316;
  --c-restrictive: #ef4444;
  --c-moratorium: #a855f7;
  --c-no-policy: #e5e2db;
  --c-pending: #c8c4bc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Newsreader', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  display: grid;
  grid-template-columns: 56px 1fr;
  grid-template-rows: 44px 1fr;
}

/* HEADER */
header {
  grid-column: 1/-1;
  background: var(--nav-bg);
  color: #f5f3ee;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
  z-index: 200;
  border-bottom: 1px solid #2a2720;
}
.h-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; }
.h-sep { color: #3a3630; }
.h-meta { font-family: 'Syne', sans-serif; font-size: 10px; color: #7a7570; letter-spacing: .05em; }
.h-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.btn {
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 4px 10px;
  border: 1px solid; cursor: pointer; transition: all .15s; background: transparent;
}
.btn-ghost { color: #7a7570; border-color: #3a3630; }
.btn-ghost:hover { color: #f5f3ee; border-color: #f5f3ee; }
.btn-accent { background: var(--accent); color: var(--text); border-color: var(--accent); }
.btn-accent:hover { background: #e6b800; }
.btn-sm { padding: 3px 8px; font-size: 9px; }

/* NAV */
nav {
  background: var(--nav-bg);
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 0; gap: 2px; z-index: 100;
}
.nav-item {
  width: 44px; height: 44px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; border-radius: 3px;
  color: #5a5550; font-family: 'Syne', sans-serif;
  font-size: 7.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  transition: all .15s;
}
.nav-item:hover { color: #f5f3ee; background: rgba(255,255,255,.07); }
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 16px; height: 16px; }

/* MAIN */
main { position: relative; overflow: hidden; }
.view { position: absolute; inset: 0; display: none; overflow: hidden; }
.view.active { display: flex; }

/* MAP VIEW */
#map-view { flex-direction: row; }
.map-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.map-toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
}
.lens-label { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.lens-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.lens-btn {
  font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: .04em;
  padding: 3px 9px; border: 1px solid var(--border); background: transparent; cursor: pointer;
  border-radius: 20px; color: var(--muted); transition: all .15s;
}
.lens-btn:hover { border-color: var(--text); color: var(--text); }
.lens-btn.active { background: var(--text); color: #f5f3ee; border-color: var(--text); }
.map-wrap { flex: 1; position: relative; overflow: hidden; background: #edeae4; }
#map-svg { width: 100%; height: 100%; }
.county { stroke: #d8d4cc; stroke-width: .3; cursor: default; }
.county.has-policy { cursor: pointer; }
.county.has-policy:hover { stroke: var(--text); stroke-width: 1.5; opacity: .85; }
.state-borders { fill: none; stroke: #c8c4bc; stroke-width: .7; pointer-events: none; }
.nation-border { fill: none; stroke: #b8b4ac; stroke-width: 1.2; pointer-events: none; }

.map-legend {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(255,255,255,.95); border: 1px solid var(--border);
  padding: 10px 12px; backdrop-filter: blur(4px);
  font-family: 'Syne', sans-serif; font-size: 9px; min-width: 130px;
}
.legend-head { font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; font-weight: 500; }
.l-swatch { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }

.map-tooltip {
  position: absolute; pointer-events: none; z-index: 300;
  background: var(--nav-bg); color: #f5f3ee;
  padding: 10px 12px; font-family: 'Syne', sans-serif; font-size: 10px;
  max-width: 220px; display: none; box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
.tt-name { font-size: 13px; font-weight: 800; margin-bottom: 1px; }
.tt-state { color: #9a9590; font-size: 9px; margin-bottom: 7px; }
.tt-badge { display: inline-block; padding: 2px 8px; font-size: 9px; font-weight: 700; border-radius: 2px; margin-bottom: 6px; }
.tt-text { font-family: 'Newsreader', serif; font-size: 11px; font-style: italic; color: #c8c4bc; line-height: 1.4; }

/* DETAIL PANEL */
#detail-panel {
  width: 340px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: none; flex-direction: column; overflow: hidden;
}
#detail-panel.open { display: flex; }
.dp-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.dp-close { float: right; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; }
.dp-county { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; line-height: 1.1; }
.dp-state { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; }
.dp-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.dp-field { margin-bottom: 12px; }
.dp-label { font-family: 'Syne', sans-serif; font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.dp-value { font-size: 12.5px; line-height: 1.5; }
.posture-badge {
  display: inline-block; padding: 2px 9px; font-family: 'Syne', sans-serif;
  font-size: 9px; font-weight: 700; letter-spacing: .05em; border-radius: 2px;
}
.bss-bar { display: flex; gap: 3px; margin-top: 4px; }
.bss-pip { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
.bss-pip.on { background: #ef4444; }
.dp-link { font-family: 'Syne', sans-serif; font-size: 9px; color: var(--muted); word-break: break-all; }
.dp-link a { color: inherit; }
.dp-actions { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }
.dp-flag { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 3px 9px; border-radius: 2px; display: inline-block; margin-top: 4px; }
.flag-weld { background: #fef08a; color: #713f12; }
.flag-warn { background: #fecaca; color: #7f1d1d; }
.flag-info { background: #dbeafe; color: #1e3a5f; }

/* DASHBOARD */
#dashboard-view { flex-direction: column; overflow-y: auto; padding: 20px; gap: 18px; background: var(--bg); }
.dash-section-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); padding: 14px; }
.stat-n { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; line-height: 1; }
.stat-l { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); padding: 14px; }
.chart-title { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-family: 'Syne', sans-serif; font-size: 10px; }
.bar-label { min-width: 130px; font-weight: 500; color: var(--muted); font-size: 9px; letter-spacing: .03em; }
.bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 1px; }
.bar-fill { height: 100%; border-radius: 1px; transition: width .4s; }
.bar-val { min-width: 24px; font-weight: 700; font-size: 10px; }

/* TIMELINE */
#timeline-view { flex-direction: column; overflow-y: auto; padding: 20px; background: var(--bg); }
.tl-year-block { margin-bottom: 28px; }
.tl-year-head { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--border); border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
.tl-entry {
  display: flex; gap: 14px; padding: 10px 8px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .1s;
}
.tl-entry:hover { background: var(--surface); }
.tl-date { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; color: var(--muted); min-width: 88px; padding-top: 2px; }
.tl-info { flex: 1; }
.tl-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; margin-bottom: 2px; }
.tl-bottom { font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.4; }

/* COMPARE */
#compare-view { flex-direction: column; overflow: hidden; padding: 16px; gap: 10px; background: var(--bg); }
.compare-controls { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
#compare-select {
  font-family: 'Syne', sans-serif; font-size: 11px; padding: 6px 8px;
  border: 1px solid var(--border); background: var(--surface); flex: 1; max-width: 500px;
}
.compare-wrap { flex: 1; overflow: auto; }
.compare-table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
.compare-table th {
  background: var(--nav-bg); color: #f5f3ee;
  font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; padding: 9px 10px;
  text-align: left; position: sticky; top: 0; z-index: 10; white-space: nowrap;
}
.compare-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; max-width: 180px; }
.compare-table tr:hover td { background: #faf8f3; }
.compare-table .row-label {
  font-family: 'Syne', sans-serif; font-size: 8.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
  background: var(--bg); min-width: 120px; position: sticky; left: 0; z-index: 5;
}
.compare-table .divergent { background: #fffbeb !important; }
.diff-summary { font-family: 'Syne', sans-serif; font-size: 10px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; flex-shrink: 0; }

/* PATTERNS */
#patterns-view { flex-direction: column; overflow-y: auto; padding: 20px; background: var(--bg); gap: 12px; max-width: 760px; }
.insight-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--text); padding: 14px 16px; }
.insight-card.hi { border-left-color: var(--accent); }
.insight-card.warn { border-left-color: #ef4444; }
.insight-card.info { border-left-color: #60a5fa; }
.insight-head { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.insight-body { font-size: 13px; line-height: 1.6; }
.insight-body strong { font-weight: 600; }

/* DISCOVERY */
#discovery-view { flex-direction: column; overflow: hidden; }
.disc-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.disc-tab {
  font-family: 'Syne', sans-serif; font-size: 9.5px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 9px 13px;
  cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted);
  transition: all .15s;
}
.disc-tab:hover { color: var(--text); }
.disc-tab.active { color: var(--text); border-bottom-color: var(--text); }
.disc-body { flex: 1; overflow: auto; }
.disc-panel { display: none; padding: 18px; }
.disc-panel.active { display: block; }

/* ADD POLICY */
#add-view { flex-direction: column; overflow-y: auto; padding: 20px; background: var(--bg); gap: 14px; max-width: 700px; }
.form-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
.form-subtitle { font-size: 13px; color: var(--muted); font-style: italic; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.f-field { display: flex; flex-direction: column; gap: 4px; }
.f-field.full { grid-column: 1/-1; }
.f-label { font-family: 'Syne', sans-serif; font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.f-input, .f-select, .f-textarea {
  font-family: 'Newsreader', serif; font-size: 13px;
  padding: 7px 9px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text); width: 100%;
}
.f-input:focus, .f-select:focus, .f-textarea:focus { outline: 2px solid var(--text); outline-offset: -2px; }
.f-textarea { resize: vertical; min-height: 64px; }
.f-select { font-family: 'Syne', sans-serif; font-size: 11px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* UTIL */
.empty-state { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--muted); font-style: italic; padding: 20px 0; }
.tag { display: inline-block; font-family: 'Syne', sans-serif; font-size: 8.5px; font-weight: 700; letter-spacing: .04em; padding: 2px 7px; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="h-title">Civic AI Policy Observatory</div>
  <div class="h-sep">—</div>
  <div class="h-meta" id="h-count">0 counties tracked</div>
  <div class="h-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportTSV()">Export TSV</button>
    <button class="btn btn-accent btn-sm" onclick="switchView('add')">+ Add Policy</button>
  </div>
</header>

<nav>
  <div class="nav-item active" data-view="map" onclick="switchView('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15M15 6v15"/></svg>
    Map
  </div>
  <div class="nav-item" data-view="dashboard" onclick="switchView('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dash
  </div>
  <div class="nav-item" data-view="timeline" onclick="switchView('timeline')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Time
  </div>
  <div class="nav-item" data-view="compare" onclick="switchView('compare')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="18"/><rect x="13" y="3" width="8" height="18"/></svg>
    Comp
  </div>
  <div class="nav-item" data-view="patterns" onclick="switchView('patterns')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
    Lens
  </div>
  <div class="nav-item" data-view="discovery" onclick="switchView('discovery')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Find
  </div>
  <div class="nav-item" data-view="add" onclick="switchView('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add
  </div>
</nav>

<main>

<!-- MAP VIEW -->
<div class="view active" id="map-view">
  <div class="map-area">
    <div class="map-toolbar">
      <span class="lens-label">Color by</span>
      <div class="lens-btns">
        <button class="lens-btn active" data-lens="posture">Posture</button>
        <button class="lens-btn" data-lens="policy_type">Policy Type</button>
        <button class="lens-btn" data-lens="equity">Equity Language</button>
        <button class="lens-btn" data-lens="resident">Resident-Facing</button>
        <button class="lens-btn" data-lens="blind_spot">Blind Spot Score</button>
        <button class="lens-btn" data-lens="domains">High-Risk Domains</button>
        <button class="lens-btn" data-lens="year">Adoption Year</button>
        <button class="lens-btn" data-lens="accountability">Accountability</button>
      </div>
    </div>
    <div class="map-wrap">
      <svg id="map-svg"></svg>
      <div class="map-legend" id="map-legend"></div>
      <div class="map-tooltip" id="map-tooltip"></div>
    </div>
  </div>
  <div id="detail-panel">
    <div class="dp-header">
      <button class="dp-close" onclick="closeDetail()">✕</button>
      <div class="dp-county" id="dp-county"></div>
      <div class="dp-state" id="dp-state"></div>
    </div>
    <div class="dp-body" id="dp-body"></div>
    <div class="dp-actions">
      <button class="btn btn-ghost btn-sm" id="dp-edit-btn">Edit</button>
      <button class="btn btn-ghost btn-sm" id="dp-link-btn">Source ↗</button>
    </div>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div class="view" id="dashboard-view">
  <div id="dash-inner" style="width:100%;"></div>
</div>

<!-- TIMELINE VIEW -->
<div class="view" id="timeline-view">
  <div id="tl-inner" style="width:100%;"></div>
</div>

<!-- COMPARE VIEW -->
<div class="view" id="compare-view">
  <div class="compare-controls">
    <select id="compare-select" multiple size="3">
    </select>
    <button class="btn btn-ghost" onclick="renderCompare()">Compare Selected</button>
    <button class="btn btn-ghost btn-sm" onclick="exportCompare()">Export TSV</button>
  </div>
  <div class="diff-summary" id="diff-summary"></div>
  <div class="compare-wrap">
    <div id="compare-table-wrap"></div>
  </div>
</div>

<!-- PATTERNS VIEW -->
<div class="view" id="patterns-view">
  <div id="patterns-inner" style="width:100%;padding:20px;"></div>
</div>

<!-- DISCOVERY VIEW -->
<div class="view" id="discovery-view">
  <div class="disc-tabs">
    <div class="disc-tab active" data-disc="blindspot">Civic Blind Spot</div>
    <div class="disc-tab" data-disc="govgap">Governance Gaps</div>
    <div class="disc-tab" data-disc="wave">Adoption Wave</div>
    <div class="disc-tab" data-disc="similar">Most Similar</div>
    <div class="disc-tab" data-disc="heatmap">Field Heatmap</div>
  </div>
  <div class="disc-body">
    <div class="disc-panel active" id="disc-blindspot"></div>
    <div class="disc-panel" id="disc-govgap"></div>
    <div class="disc-panel" id="disc-wave"></div>
    <div class="disc-panel" id="disc-similar"></div>
    <div class="disc-panel" id="disc-heatmap"></div>
  </div>
</div>

<!-- ADD POLICY VIEW -->
<div class="view" id="add-view">
  <div id="add-inner"></div>
</div>

</main>

<script>
// ─── SEED DATA ────────────────────────────────────────────────────────────────
const SEED_DATA = [
  {fips:"01073",county_name:"Jefferson",state:"Alabama",title:"Jefferson AI Policy",url:"https://www.jccal.org/DocumentCenter/View/1057/Acceptable-Artificial-Intelligence-AI-Usage-Rule-PDF?bidId=",adoption_date:"2025-04-22",policy_type:"HR / Acceptable Use Rule",posture:"Permissive with guardrails",posture_notes:"Employees may use approved AI tools; IT maintains approved list; prohibited uses are enumerated but general use within guardrails is allowed.",coverage:"Applies to all employees with access to county data and systems; no explicit coverage of resident-facing services or automated decisions affecting constituents.",key_prohibitions:"Sharing PII or confidential data with AI tools; using AI for final decisions on legal matters without human review; generating deepfakes or deceptive content; election-related content; discriminatory or defamatory content; violating privacy laws.",key_requirements:"Use only IT-approved AI tools; disclose AI-generated content to supervisor; employees are accountable for AI-generated work product; violations subject to disciplinary action up to termination.",high_risk_domains:"Legal decisions, Elections (election-related content prohibited), Personnel decisions",equity_bias_language:"Prohibited uses include discriminatory content; 'Ethical AI' defined in policy, but no substantive bias assessment or equity framework described.",accountability:"Employees personally responsible for AI-generated content; IT maintains approved tools list; disciplinary process up to termination for violations; no named AI oversight officer or board.",bottom_line:"Jefferson County's HR rule focuses on data security and employee conduct guardrails, with prohibited uses covering legal decisions, deepfakes, and election-related content. No resident-facing AI provisions. Most distinctive finding: election-related content is flatly prohibited — one of the more explicit election integrity provisions at county level."},
  {fips:"02100",county_name:"Haines",state:"Alaska",title:"Haines AI Policy",url:"https://www.hainesalaska.gov/media/75666",adoption_date:"2024-03-06",policy_type:"Administrative / Executive Policy",posture:"Approval-based",posture_notes:"Explicit prior permission required before any AI tool use on Borough devices or for Borough business; each new tool must be individually approved by Borough IT.",coverage:"All employees, contractors, and third-party entities; no explicit coverage of resident-facing services or constituent-affecting automated decisions.",key_prohibitions:"Using any AI tool without explicit prior permission; providing sensitive information to AI tools without explicit authorization; modifying or manipulating AI tools.",key_requirements:"Explicit prior permission for every AI tool use; IT approval required for each new tool before use; documentation of AI use; human oversight required before binding decisions; no sensitive data in AI tools without authorization.",high_risk_domains:"Binding decisions (human oversight required); sensitive information handling",equity_bias_language:"None",accountability:"Employees must document AI use; violations subject to disciplinary action; Borough IT is approval authority; no dedicated AI oversight role named.",bottom_line:"Haines Borough adopts the most restrictive pre-approval posture among Alaskan counties: every AI tool requires explicit prior permission and individual IT approval, making AI use opt-in by exception. No equity language, no resident-facing provisions. Most distinctive finding: blanket prior-permission requirement is more restrictive than standard approved-list models."},
  {fips:"02110",county_name:"Juneau",state:"Alaska",title:"Juneau AI Policy",url:"https://juneau.org/index.php?gf-download=2026%2F03%2F26-02-Generative-Artificial-Intelligence-Use-Policy.pdf&form-id=25&field-id=4&entry-id=123303",adoption_date:"2026-03-20",policy_type:"Administrative / Executive Policy",posture:"Approval-based",posture_notes:"IT Director must review and approve all generative AI tools before use; employees may use approved tools with prior approval for enumerated tasks; City Manager has final policy authority.",coverage:"All CBJ employees and volunteers; AI-derived work may constitute public record; no explicit resident-facing AI provisions, but public records implication touches constituent interests.",key_prohibitions:"Using non-approved AI tools; uploading confidential, sensitive, or PII data without IT Director and City Manager vetting; using AI to make final decisions on policy, personnel, legal interpretations, or financial transactions without human oversight.",key_requirements:"IT Director pre-approval of all tools and maintenance of approved list; employees must review AI output for accuracy, gender and racial bias, privacy, copyright, ethics, and legal compliance; AI-generated work treated as potential public record.",high_risk_domains:"Policy decisions, Personnel matters, Legal interpretations, Financial transactions, Public records",equity_bias_language:"Employees explicitly required to review AI output for gender and racial bias as part of standard professional judgment — one of the more specific bias-review mandates among comparable county policies.",accountability:"IT Director approves tools; City Manager approves policy; employees personally accountable for AI work product; public records obligation creates external accountability vector.",bottom_line:"Juneau explicitly names gender and racial bias as required review criteria for all AI-generated content, treats AI work as potential public records, and assigns clear dual authority (I   {fips:"02230",county_name:"Skagway",state:"Alaska",title:"Skagway AI Policy",url:"https://www.skagway.org/media/83911",adoption_date:"not listed",policy_type:"IT Policy",posture:"Permissive with guardrails",posture_notes:"AI governance embedded within a broader IT acceptable use policy; no standalone AI framework; public records disclosure requirement applies to all communications including AI-generated content.",coverage:"All employees, contractors, vendors, consultants, and volunteers using MOS-owned devices and systems; BYOD data subject to public records disclosure; no explicit resident-facing AI or automated decision provisions.",key_prohibitions:"No AI-specific prohibitions identified; general IT AUP prohibitions apply.",key_requirements:"Compliance with Alaska Public Records Act (Title 40, Chapter 25); data retention per SMC 3.20; annual IT Governance Committee policy review; Alaska Technical Solutions (ATS) enforces policy.",high_risk_domains:"Public records compliance (all communications potentially disclosable); BYOD data retention",equity_bias_language:"None",accountability:"IT Governance Committee reviews annually; Alaska Technical Solutions (ATS) is enforcement authority; public records law provides external accountability.",bottom_line:"Skagway has no standalone AI policy; AI governance is absorbed into a general IT acceptable use policy with no AI-specific provisions. The thinnest AI governance framework in the Alaska group. Most distinctive finding: absence of any dedicated AI policy despite AI being referenced suggests governance is incidental rather than intentional."},
  {fips:"04003",county_name:"Cochise",state:"Arizona",title:"Cochise AI Policy",url:"https://cochise.az.gov/DocumentCenter/View/25751/1810-Generative-Artificial-Intelligence-Policy-PDF",adoption_date:"2026-03-24",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"General AI use permitted with IT-approved tools; subject-matter expert final review is mandatory; enumerated prohibitions define the guardrails.",coverage:"All County departments, employees, contractors, and third parties accessing County data, systems, or services; no explicit resident-facing AI or constituent-affecting automated decision provisions.",key_prohibitions:"Sharing confidential data with AI; using AI for final decisions without human review; generating deepfakes or deceptive content; violating privacy laws; election-related content without approval; discriminatory content.",key_requirements:"Employee accountability for AI-generated decisions and materials; assessment of AI bias and hallucinations before reliance; identification and mitigation of human bias in AI use; mandatory final review by subject-matter experts; use only CCIT-approved tools.",high_risk_domains:"Legal decisions, Elections (requires approval), Privacy-sensitive decisions",equity_bias_language:"Policy explicitly addresses both AI system bias and human bias as distinct concerns — employees must identify and mitigate human bias when using AI, and all GAI systems are acknowledged to have inherent bias and accuracy issues requiring active assessment.",accountability:"Employees personally accountable for AI-generated decisions and materials; CCIT maintains approved tools list; subject-matter expert review is mandatory; no named AI oversight officer.",bottom_line:"Cochise stands out for its dual bias framework: requiring assessment of both AI-inherent bias and human bias as distinct analytical tasks. The mandatory subject-matter expert final review adds a structural check beyond generic human oversight language. Most distinctive finding: the dual bias framework (AI system bias + human bias) is more analytically precise than most comparable county policies."},
  {fips:"04021",county_name:"Pinal",state:"Arizona",title:"Pinal AI Policy",url:"https://www.pinal.gov/DocumentCenter/View/27890/261-Use-of-Artificial-Intelligence",adoption_date:"2026-03-18",policy_type:"Administrative / Executive Policy",posture:"Approval-based",posture_notes:"Only tools on the County Intranet approved list are permitted; free AI systems are explicitly prohibited; election-related use is categorically prohibited.",coverage:"All Pinal County employees, contractors, and individuals using AI tools in a professional capacity; disclosure requirements for AI-generated public communications touch constituent-facing outputs; no explicit automated decision or resident-facing service provisions.",key_prohibitions:"Use of any AI tool not on the approved list; use of free AI systems (explicitly prohibited); using AI in connection with certified election equipment or processes; generating or analyzing election-related content that could interfere with election integrity; sharing PII without data security compliance.",key_requirements:"Use only IT-approved tools from County Intranet list; supervisor notification for AI incidents; disclosure of AI-generated content in public communications; data security compliance for PII.",high_risk_domains:"Elections (AI barred from certified election equipment or processes), Public communications, PII handling",equity_bias_language:"None",accountability:"Supervisor notification required for incidents; IT Services maintains approved list; public communications disclosure creates constituent-facing transparency; no named AI oversight officer.",bottom_line:"Pinal County has the most explicit and categorical election integrity provision: AI is flatly prohibited from use with certified election equipment or processes and from generating election content that could interfere with integrity. The explicit ban on free AI systems directly addresses shadow IT risk. Most distinctive finding: the election equipment prohibition is the strongest election-specific AI restriction in the entire dataset."},

  {fips:"06017",county_name:"El Dorado",state:"California",title:"El Dorado AI Policy",url:"https://www.eldoradocounty.ca.gov/files/assets/county/v/2/documents/government/bos/agendas/2024/nov-19-2024/item-24.pdf",adoption_date:"2026-01-27",policy_type:"Administrative / Executive Policy",posture:"Risk-tiered",posture_notes:"Policy establishes a governance structure with defined roles, risk assessment processes, and protected data categories (PII, HIPAA, CJIS, PHI, PCI); risk management framework implies tiered treatment based on data sensitivity.",coverage:"All AI systems used by or on behalf of the County; law enforcement (CJIS) and health data (HIPAA/PHI) explicitly identified as high-sensitivity categories; no explicit resident-facing AI provisions in available extract, but governance scope is broad. Law enforcement carved out via CJIS protected data classification.",key_prohibitions:"Use of protected data categories (PII, HIPAA, CJIS, PHI, PCI) outside governance controls; not fully specified in available extract.",key_requirements:"Defined roles and responsibilities for AI governance; guidance for purchasing, configuring, developing, operating, and maintaining AI systems; adherence to Guiding Principles; risk assessment and management processes for AI deployment.",high_risk_domains:"Criminal justice (CJIS explicitly named), Health information (HIPAA/PHI), Payment card data (PCI), PII",equity_bias_language:"None identified in available extract.",accountability:"Board of Supervisors adoption establishes legislative accountability; defined roles and responsibilities are a structural accountability feature; Guiding Principles referenced but not available in extract.",bottom_line:"El Dorado takes a governance-architecture approach — establishing roles, purchasing guidance, and risk management rather than a rules-based prohibitions approach. Explicitly incorporates CJIS criminal justice data standards. Most distinctive finding: explicit CJIS integration into AI governance framework, and law enforcement carve-out via data classification — a recurring gap."},
  {fips:"06027",county_name:"Inyo",state:"California",title:"Inyo AI Policy",url:"https://www.inyocounty.us/sites/default/files/2025-12/Inyo%20County%20AI%20Approach.pdf",adoption_date:"not listed",policy_type:"IT Policy",posture:"Approval-based",posture_notes:"Only Information Services Department-approved tools are authorized; all prompts treated as publicly visible regardless of tool; resident-facing AI use carries informed consent requirement.",coverage:"All employees, contractors, and third parties using AI on behalf of Inyo County; explicitly covers resident-facing AI interactions (informed consent required); HIPAA, CJIS, IRS regulations, and CCPA compliance indicate coverage of sensitive constituent data contexts.",key_prohibitions:"Use of non-approved AI tools; inclusion of PII, PHI, or other sensitive information in prompts; violation of HIPAA, CJIS, IRS regulations, or CCPA.",key_requirements:"Use only Information Services-approved tools; register AI services with County email; treat all prompts as publicly visible; complete required training; residents must be informed when AI interacts with them.",high_risk_domains:"Resident-facing AI interactions (informed consent required), Health data (HIPAA/PHI), Criminal justice (CJIS), Tax data (IRS), Consumer privacy (CCPA)",equity_bias_language:"None explicitly stated, but informed consent provision for resident-facing AI and CCPA compliance provide implicit consumer protection for constituents.",accountability:"Information Services Department is approval authority; supervisor reporting for concerns; training compliance required; no named AI oversight officer; public visibility assumption for all prompts is a de facto transparency mechanism.",bottom_line:"Inyo County requires informed consent when AI interacts with residents — one of very few counties addressing resident-facing AI explicitly. The requirement to treat all prompts as publicly visible is a strong operational transparency norm. Most distinctive finding: the informed consent requirement for resident-facing AI interactions is among the most direct constituent protections in the dataset."},
  {fips:"06041",county_name:"Marin",state:"California",title:"Marin AI Guidelines",url:"https://assets.marincounty.gov/marincounty-prod/public/2025-05/AI%20Guidelines%202025.pdf",adoption_date:"not listed",policy_type:"Guidelines / Best Practices (non-binding)",posture:"Permissive",posture_notes:"Non-binding guidelines covering all AI use (generative, enterprise, narrow AI); no enforcement mechanism; resident-facing and equity considerations addressed but not mandated.",coverage:"Broadest scope in this set: all instances where AI is used by the County in new or existing systems or updates, whether developed, purchased, subscribed to, or freely provided; explicitly covers AI in public-facing services.",key_prohibitions:"No hard prohibitions; guidelines identify risk areas (privacy, bias, lack of transparency) as concerns to address.",key_requirements:"Privacy and security review; transparency with public about AI use; equity and bias consideration; human oversight; vendor assessment before procurement; public records compliance.",high_risk_domains:"Public-facing services, Vendor-supplied AI systems, Privacy-sensitive applications",equity_bias_language:"Guidelines address bias and equity in AI deployment for both internal operations and public-facing services; equity is named as a core principle alongside privacy and transparency, but no structured bias assessment is required.",accountability:"No enforcement mechanism (explicitly non-binding); vendor assessment provision creates pre-procurement accountability; transparency requirement to the public creates reputational accountability; no named oversight officer.",bottom_line:"Marin County has the broadest definitional scope — covering all AI types across all deployment modes including freely provided tools — and explicitly includes transparency to the public. However, non-binding status makes all provisions aspirational. Most distinctive finding: widest gap between policy ambition and enforcement capacity in the dataset — most resident-facing provisions but legally unenforceable."},
  {fips:"06043",county_name:"Mariposa",state:"California",title:"Mariposa AI Policy",url:"http://www.mariposacounty.gov/DocumentCenter/View/101161/Mariposa-County-AI-Policy",adoption_date:"2025-10-01",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Employees may use IT-approved AI tools for county business; use is enabled but gated by IT approval, data restrictions, and mandatory human review of outputs.",coverage:"Covers all county employees, contractors, and volunteers using county IT systems; no explicit coverage of resident-facing automated decisions stated in available text.",key_prohibitions:"No AI for final decisions without human review; no PII input into unapproved AI tools; no use of personal AI accounts for county business without approval; no AI-generated misleading or deceptive content.",key_requirements:"Use only IT-approved AI tools; verify AI output for accuracy before use; disclose AI use when producing official documents; complete required training; department heads ensure staff compliance.",high_risk_domains:"Final decision-making, Official documents, PII handling",equity_bias_language:"None",accountability:"Department heads responsible for staff compliance; IT department controls approved tools list.",bottom_line:"A standard employee acceptable-use policy enabling AI adoption within IT-controlled guardrails. Most important finding: prohibition on using AI for final decisions without human review, but the policy is silent on resident-facing services and equity considerations."},

  {fips:"08035",county_name:"Douglas",state:"Colorado",title:"Douglas AI Policy",url:"https://www.douglasco.gov/documents/artificial-intelligence-ai-policy.pdf/",adoption_date:"2025-12-15",policy_type:"Administrative / Executive Policy",posture:"Risk-tiered",posture_notes:"Four risk tiers (low, medium, high, critical) with escalating approval requirements; high and critical tiers require executive review.",coverage:"Covers all county AI deployments including public-facing services; equity review required for AI affecting public services; resident-facing and automated decisions explicitly in scope.",key_prohibitions:"Use of AI systems not cleared through risk tier process; handling PII without privacy impact assessment; deploying high-risk AI without executive approval.",key_requirements:"Risk-tiered classification and approval; privacy impact assessments for PII-touching systems; human oversight for high-risk decisions; equity review for public-service AI; vendor risk assessments; incident response; training; AI inventory/registry; public-facing transparency disclosures.",high_risk_domains:"High-risk and critical AI systems (executive approval required), PII-touching systems, Public-facing AI services",equity_bias_language:"Equity review required for AI systems affecting public services; equity is a formal checkpoint in the approval workflow, not merely aspirational language.",accountability:"AI Center of Excellence (aicoe@douglas.co.us) owns the policy; AI inventory/registry tracks all deployments; incident response procedures defined; executive approval required for high-risk systems.",bottom_line:"Douglas County's risk-tiered framework is structurally mature, with four distinct approval tracks, formal equity checkpoints, and a mandatory AI registry. The named AI Center of Excellence signals institutional commitment. Most distinctive finding: combination of risk tiering plus mandatory equity review for public-service AI creates a replicable governance scaffold."},
  {fips:"08123",county_name:"Weld",state:"Colorado",title:"Weld AI Policy",url:"https://www.weld.gov/Government/Departments/Finance-and-Administration/AI-Policy",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Approved tools permitted broadly; high-risk AI triggers mandatory public disclosure obligations rather than prohibition.",coverage:"Covers all county AI use; explicitly covers resident-facing and high-risk AI affecting constituents; public registry requirement directly addresses impact on the public.",key_prohibitions:"Use of unapproved tools; inputting data that violates privacy requirements; deploying high-risk AI without discrimination risk disclosure.",key_requirements:"Approved tools list; public-facing website listing all high-risk AI systems (purpose, function, discrimination risk management); human oversight for consequential decisions; equity/bias assessments; employee training; vendor requirements.",high_risk_domains:"All AI systems classified as high-risk; systems with discrimination risk",equity_bias_language:"Substantive — discrimination risk management disclosures are a mandatory element of the public AI registry. The most operationalized anti-bias mechanism in the dataset: not just a prohibition but a required public disclosure.",accountability:"Mandatory public website listing all high-risk AI systems is the primary accountability mechanism — unique in the entire dataset.",bottom_line:"Weld County's mandatory public AI registry — requiring disclosure of what each high-risk system does, why it's used, and how discrimination risk is managed — is the strongest public transparency mechanism in the entire dataset. No other county requires a live, public-facing inventory with discrimination disclosures. Most distinctive finding: the gold standard for constituent-facing AI accountability — no peer policy matches it."},
  {fips:"09140",county_name:"Naugatuck Valley",state:"Connecticut",title:"Naugatuck Valley AI Policy",url:"https://nvcogct.gov/wp-content/uploads/2026/02/04-Personnel-Policy-and-Employee-Manual-Adopted-December-2024-2.pdf",adoption_date:"2024-12-01",policy_type:"HR / Acceptable Use Rule",posture:"Permissive with guardrails",posture_notes:"Employees may use approved AI tools for work tasks; prohibitions focus on data inputs and prohibited output categories; no tiered risk structure.",coverage:"NVCOG employees only; no coverage of resident-facing services or automated decisions affecting constituents — policy is entirely internal HR-focused.",key_prohibitions:"Inputting sensitive or confidential data into AI tools; using AI to make final employment or benefit decisions; generating discriminatory content; inputting PII without authorization.",key_requirements:"Use only approved AI tools; verify and review all AI outputs; disclose AI use in work products; complete required training.",high_risk_domains:"Employment and benefit decisions (prohibited as sole AI decision)",equity_bias_language:"Prohibition on generating discriminatory content; prohibition on AI making final employment or benefit decisions. Framed as prohibited conduct rather than affirmative equity assessment.",accountability:"Embedded in employee handbook; disciplinary framework applies through standard HR mechanisms; no dedicated AI governance body named.",bottom_line:"As a regional council of governments rather than a county, NVCOG's policy is narrowly scoped to internal employee conduct with no constituent-facing provisions. Most distinctive finding: prohibition on AI making final employment or benefit decisions is a meaningful guardrail, but resident-facing AI and automated decisions affecting constituents are entirely outside scope."},
  {fips:"11001",county_name:"District of Columbia",state:"District of Columbia",title:"DC AI Policy / Mayor's Order",url:"https://techplan.dc.gov/page/mayors-order-articulating-dc%E2%80%99s-artificial-intelligence-policy",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Expansive pro-adoption framing with equity and transparency values; strategic benchmarks rather than hard restrictions; governance bodies established by executive order.",coverage:"Broad public sector AI governance scope; equity and accountability values apply to government AI broadly; community engagement mechanism suggests constituent impact is in scope.",key_prohibitions:"Not specified in available text.",key_requirements:"Adherence to DC AI values (accountability, equity, transparency, privacy); progress against strategic benchmarks; AI Taskforce and AI Advisory Group participation; community engagement for AI governance.",high_risk_domains:"Not specifically enumerated; equity and transparency requirements imply application to public-service AI",equity_bias_language:"Equity is named as a core DC AI value; community engagement for governance suggests equity-centered process. Substantive implementation mechanisms not detailed in available text.",accountability:"AI Taskforce and AI Advisory Group established by Mayor's Order; CRITICAL: both bodies sunset December 31, 2026 with no stated renewal mechanism — a live governance cliff.",bottom_line:"DC's Mayor's Order establishes ambitious values-based AI governance with equity and transparency at the center. Most distinctive finding: both governance bodies (AI Taskforce and Advisory Group) sunset December 31, 2026 with no renewal provision — a governance cliff that could leave DC's AI framework unenforceable without legislative or executive action."},
  {fips:"12075",county_name:"Levy",state:"Florida",title:"Levy AI Policy",url:"https://www.levycounty.org/DocumentCenter/View/815/HR-2025-71-Acceptable-Use-of-AI",adoption_date:"2024-12-01",policy_type:"HR / Acceptable Use Rule",posture:"Permissive with guardrails",posture_notes:"Approved tools permitted; human review required for all AI outputs; prohibitions focus on data handling and output categories; no risk tiering.",coverage:"Covers all county employees and contractors; no explicit coverage of resident-facing services or automated decisions affecting constituents.",key_prohibitions:"Inputting PII or confidential data into AI tools; uses not on approved list.",key_requirements:"Use only approved AI tools; human review required for all AI outputs; disclose AI use; complete training.",high_risk_domains:"",equity_bias_language:"None",accountability:"HR policy enforcement through standard disciplinary procedures; no dedicated AI governance body or registry.",bottom_line:"Levy County's policy is a standard HR acceptable use rule focused on employee conduct, data protection, and tool approval. No equity provisions and no coverage of AI affecting constituents. Most distinctive finding: one of the least protective county policies for residents in the dataset — entirely internal-facing."},
  {fips:"12086",county_name:"Miami-Dade",state:"Florida",title:"Miami-Dade AI Policy",url:"https://www.miamidade.gov/global/comms-tech/technology/ai/ai-policy.page",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"County-wide policy with approved tools requirement, privacy and oversight guardrails, equity mentioned but not structurally enforced.",coverage:"Covers all county employees; equity considerations and transparency requirements suggest some coverage of resident-facing services; scope of automated decision coverage not specified.",key_prohibitions:"Use of unapproved AI tools; data privacy violations; generating AI content without transparency disclosures.",key_requirements:"Approved tools list; data privacy protections; human oversight; transparency in AI-generated content; vendor requirements for AI procurement; training; incident reporting.",high_risk_domains:"",equity_bias_language:"Equity considerations mentioned; not described as a formal checkpoint or assessment requirement — aspirational rather than procedural.",accountability:"IT governance structure; incident reporting mechanism; vendor requirements as procurement accountability.",bottom_line:"Miami-Dade has a comprehensive county-wide policy covering employees, procurement, and vendor requirements. Most distinctive finding: vendor requirements for AI procurement are a meaningful accountability mechanism absent from many peer policies, but equity provisions are aspirational rather than enforced."},
  {fips:"13067",county_name:"Cobb",state:"Georgia",title:"Cobb AI Policy",url:"https://assets.cobbcounty.gov/files/2025-08/Information-Technology-Artificial-Intelligence-Acceptable-Use-Standards.pdf",adoption_date:"2025-08-01",policy_type:"IT Policy",posture:"Approval-based",posture_notes:"Only approved AI tools permitted; approval governed through IT governance structure; data classification requirements gate AI use; no risk tiering beyond data classification.",coverage:"Covers all Cobb County employees and contractors; disclosure requirements for AI-generated content in official communications suggests some resident-facing coverage; automated decision coverage not specified.",key_prohibitions:"Use of unapproved AI tools; inputting PII or confidential data without security vetting; generating discriminatory content; creating deceptive content; violating privacy.",key_requirements:"Use only approved AI tools; data classification and protection compliance; human review for significant AI outputs; disclosure of AI-generated content in official communications; training; vendor assessment for AI tools.",high_risk_domains:"",equity_bias_language:"Prohibition on generating discriminatory content. No affirmative equity assessment or bias testing requirement.",accountability:"IT governance structure with ITS Division Directors as approvers; Board of Commissioners as policy owner; vendor assessment process.",bottom_line:"Cobb County's IT-governed approval-based policy is technically sound with strong data classification requirements and vendor assessment but lacks risk tiering and affirmative equity mechanisms. Most distinctive finding: disclosure requirement for AI-generated content in official communications is a notable transparency provision for resident-facing outputs, but accountability sits entirely within IT governance."},
  {fips:"66010",county_name:"Guam",state:"Guam",title:"Guam AI Use Policy",url:"https://otech.guam.gov/wp-otech-content/uploads/2025/01/OTECH-POL2025-001-AI-Use-Policy-for-GovGuam-Line-Agencies.pdf",adoption_date:"2025-01-22",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Approved use cases permitted across all line agencies; governance centralized in OTECH; prohibitions focus on sensitive data exposure; no risk tiering.",coverage:"Covers all Guam government line agencies; scope is territory-wide government operations; resident-facing AI coverage implied but not explicitly detailed.",key_prohibitions:"Exposing sensitive government data through AI systems; unapproved use cases.",key_requirements:"Use only approved AI use cases; data protection compliance; human oversight; training; governance through OTECH; incident reporting.",high_risk_domains:"",equity_bias_language:"None",accountability:"Office of Technology (OTECH) as central governance authority for all line agencies; incident reporting mechanism.",bottom_line:"Guam's territory-wide policy is notable for its centralized governance through a single technology office (OTECH) across all line agencies. Most distinctive finding: territory-wide centralized governance through a single technology authority is an organizational model distinct from county-level peer policies — no fragmentation across departments."},
  {fips:"16055",county_name:"Kootenai",state:"Idaho",title:"Kootenai AI Policy",url:"https://www.kcgov.us/DocumentCenter/View/26664/19--Board-Approval-Request---Section-408---Generative-AI-Policy",adoption_date:"not listed",policy_type:"IT Policy",posture:"Permissive with guardrails",posture_notes:"Policy appears to be a BOCC-approved amendment to existing Computer Use Policy (Section IV, Policy 425); specific provisions not available due to unreadable scanned PDF.",coverage:"Unknown — source document is a scanned PDF with no readable text.",key_prohibitions:"Unknown — text not available.",key_requirements:"Unknown — text not available; policy exists as an amendment to Computer Use Policy 425.",high_risk_domains:"",equity_bias_language:"Unknown — text not available.",accountability:"Board of County Commissioners (BOCC) approval documented; policy integrated into broader Computer Use Policy framework.",bottom_line:"Kootenai County's AI policy cannot be substantively analyzed due to unreadable scanned PDF. What is known: it is a BOCC-approved amendment to existing Computer Use Policy 425, suggesting incremental rather than standalone governance. Most distinctive finding: absence of readable policy text means no substantive provisions can be confirmed or evaluated."},
  {fips:"17085",county_name:"Jo Daviess",state:"Illinois",title:"Jo Daviess AI Policy",url:"https://www.jodaviesscountyil.gov/DocumentCenter/View/859/Generative-AI-Policy-08-2024",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Approval-based",posture_notes:"GenAI tools must be on approved list with approval through IT or department head; framing emphasizes opportunity and efficiency alongside guardrails.",coverage:"Covers county employees; disclosure requirement for GenAI use in official documents suggests some resident-facing coverage; automated decisions affecting constituents not addressed.",key_prohibitions:"Inputting PII, confidential, or sensitive data into GenAI tools; generating discriminatory content; creating deceptive materials; violating copyright; exposing sensitive data; use of unapproved tools.",key_requirements:"Use only approved GenAI tools (approval via IT or department head); human review and verification of all GenAI outputs; disclose GenAI use in official documents; training; disciplinary consequences for violations.",high_risk_domains:"",equity_bias_language:"Prohibition on generating discriminatory content. No affirmative equity assessment, bias testing, or equity review process.",accountability:"IT department and department heads as approval authorities; disciplinary action for violations; no dedicated AI governance body or registry.",bottom_line:"Jo Daviess County's GenAI-specific policy focuses on generative tools used by employees rather than the full AI deployment lifecycle. Most distinctive finding: policy is limited to generative AI and employee use — no provisions for vendor-procured AI systems, automated decisions, or resident-facing applications."},
  {fips:"19013",county_name:"Black Hawk",state:"Iowa",title:"Black Hawk AI Policy",url:"https://www.blackhawkcounty.iowa.gov/DocumentCenter/View/8310",adoption_date:"2025-09-01",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Employees may use approved AI tools; use is enabled but bounded by an approved tools list, mandatory human review, data restrictions, and disclosure requirements.",coverage:"Covers all county departments, employees, and contractors. No explicit mention of resident-facing services or automated decisions affecting constituents.",key_prohibitions:"Inputting PII, PHI, or confidential data into AI tools; generating discriminatory outputs; creating deceptive content; using unapproved tools.",key_requirements:"Use only approved tools; human review of all AI outputs; disclose AI use when relevant; complete required training; vendor requirements.",high_risk_domains:"Discriminatory outputs (prohibited), Deceptive content (prohibited)",equity_bias_language:"Policy explicitly names human rights, fairness, and equity as governing values and prohibits discriminatory AI outputs; no detailed bias-testing or disparate-impact assessment procedures specified.",accountability:"IT governance oversight; training requirements; vendor requirements; disciplinary implications implied by prohibited uses list.",bottom_line:"Black Hawk grounds its policy explicitly in human rights and fairness language — relatively strong normative framing for a county-level document. Most distinctive finding: explicit human rights and equity commitments are the most distinctive feature, though there are no procedures for assessing or auditing bias in deployed tools."},
  {fips:"20113",county_name:"McPherson",state:"Kansas",title:"McPherson AI Policy",url:"https://www.mcphersoncountyks.us/DocumentCenter/View/7939/McPherson-County-Generative-AI-Policy",adoption_date:"not listed",policy_type:"HR / Acceptable Use Rule",posture:"Permissive with guardrails",posture_notes:"Inferred from filing as an adopted Acceptable Use policy for a small rural county; specific guardrails cannot be confirmed due to unavailable text.",coverage:"Unknown — full text not available. Likely covers county employees only.",key_prohibitions:"Unknown — source document is a scanned PDF with no extractable text.",key_requirements:"Unknown — source document is a scanned PDF with no extractable text.",high_risk_domains:"",equity_bias_language:"None confirmed — text unavailable.",accountability:"Unknown — text unavailable.",bottom_line:"No policy text could be extracted from the scanned PDF; all fields are inferred from the file name and county profile. Most distinctive finding: data gap — this county cannot be meaningfully scored or compared until the document is OCR-processed."},
  {fips:"21111",county_name:"Jefferson",state:"Kentucky",title:"Jefferson (Louisville) AI Policy",url:"https://louisvilleky.gov/government/metro-technology-services/artificial-intelligence",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Approved-tools process, human oversight, and equity review indicate a structured permissive approach suited to a large urban metro government.",coverage:"Covers Louisville Metro Government broadly. Transparency requirements for AI in public services indicate explicit coverage of resident-facing services; equity considerations suggest attention to automated decisions affecting constituents.",key_prohibitions:"Inputting non-approved or sensitive data into AI; deploying AI in public services without transparency; unreviewed automated decisions (implied by human oversight requirement).",key_requirements:"Approved tools process; data privacy compliance; human oversight; transparency disclosures for public-facing AI; equity review; vendor assessment; training.",high_risk_domains:"Public-facing services (transparency requirement triggered), Procurement/vendor AI",equity_bias_language:"Equity considerations included; specifics of assessment methodology not detailed in available text.",accountability:"Metro Technology Services governance; vendor assessment; training program; transparency disclosures.",bottom_line:"As a large merged city-county government, Louisville Metro's policy is notably broader than most county-level policies, explicitly addressing AI in public-facing services and requiring resident-facing transparency. Most distinctive finding: explicit resident-facing transparency requirement combined with equity review is rare at county level — reflects the policy sophistication of a major metropolitan government."},
  {fips:"23007",county_name:"Franklin",state:"Maine",title:"Franklin AI Policy",url:"https://www.franklincountymaine.gov/wp-content/uploads/2026/01/Personnel-Policy-AI-Addendum.pdf",adoption_date:"2025-11-14",policy_type:"HR / Acceptable Use Rule",posture:"Approval-based",posture_notes:"Employees may use AI tools only with supervisor approval; use is not freely permitted — each instance requires authorization.",coverage:"Covers county employees only via the Personnel Policy Handbook. No coverage of resident-facing services or automated decisions affecting constituents.",key_prohibitions:"Inputting confidential or sensitive data; generating discriminatory content; violating privacy; personal use of AI during work hours.",key_requirements:"Supervisor approval before use; verify AI outputs for accuracy; disclose AI use when relevant to work product.",high_risk_domains:"",equity_bias_language:"Prohibits generating discriminatory content; no broader equity framework or bias assessment language.",accountability:"Supervisor approval as primary control mechanism; disclosure requirement; implied disciplinary exposure under existing HR policy framework.",bottom_line:"Franklin County takes the most conservative internal approach in this set by requiring supervisor approval for each AI use instance, embedded entirely within an HR handbook. Most distinctive finding: the per-instance supervisor approval gate is the most restrictive internal posture here, but the policy is entirely silent on any public or constituent-impact dimension."},
  {fips:"24027",county_name:"Howard",state:"Maryland",title:"Howard AI Policy",url:"https://www.howardcountymd.gov/sites/default/files/2024-10/400.6%20Guidence%20for%20AI%20Use%20Policy.pdf",adoption_date:"2024-10-01",policy_type:"Guidelines / Best Practices (non-binding)",posture:"Permissive with guardrails",posture_notes:"Titled 'Guidance' and framed as written procedure with rules and guidelines; approved tools process and data protections apply, but advisory framing suggests limited enforceability.",coverage:"Covers county employees across departments. Equity considerations mentioned but extent of coverage for resident-facing services or automated decisions is not detailed.",key_prohibitions:"Inputting confidential or sensitive data into AI systems; using unapproved tools.",key_requirements:"Approved tools process; data protection; human review of AI outputs; disclosure; equity considerations; vendor assessment; training.",high_risk_domains:"",equity_bias_language:"Equity considerations mentioned; no detailed disparate-impact or bias-audit methodology described.",accountability:"Department of County Administration and Technology and Communication Services oversight; training; vendor assessment.",bottom_line:"Howard County's policy is notable for its early adoption date (October 2024) giving it one of the longer implementation runways in this cohort. Most distinctive finding: the guidance framing rather than a binding directive may limit enforceability and create compliance ambiguity — equity language is present but not operationalized."},
  {fips:"24033",county_name:"Prince George's",state:"Maryland",title:"Prince George's AI Policy",url:"https://www.princegeorgescountymd.gov/sites/default/files/media-document/EO%203-2024%20Artificial%20Intelligence%20Use%20Policy.pdf",adoption_date:"not listed",policy_type:"Administrative / Executive Policy",posture:"Approval-based",posture_notes:"Issued as Executive Order EO 3-2024 — a binding administrative directive from the County Executive; posture details cannot be confirmed due to unavailable text. Full text not available due to scanned PDF.",coverage:"Unknown — full text not available. Executive orders typically bind county agencies and employees; resident-facing or constituent automated decision coverage cannot be confirmed.",key_prohibitions:"Unknown — source document is a scanned PDF with no extractable text.",key_requirements:"Unknown — source document is a scanned PDF with no extractable text.",high_risk_domains:"",equity_bias_language:"None confirmed — text unavailable.",accountability:"Unknown — text unavailable. Executive order form implies binding force on all county agencies.",bottom_line:"Prince George's County issued a formal Executive Order (EO 3-2024) on AI use — a higher-authority governance mechanism than most departmental guidance documents. Most distinctive finding: the executive order form implies binding force on all county agencies, but the inability to extract text makes substantive analysis impossible."},
  {fips:"26115",county_name:"Monroe",state:"Michigan",title:"Monroe AI Policy",url:"https://co.monroe.mi.us/DocumentCenter/View/4502/811-Artificial-Intelligence-PDF",adoption_date:"2025-03-19",policy_type:"IT Policy",posture:"Permissive with guardrails",posture_notes:"Housed in Information Security section; employees may use approved AI tools for productivity; use bounded by approved-tools list, data restrictions, human review, and disclosure requirements.",coverage:"Covers all county departments and employees. No explicit mention of resident-facing services or automated decisions affecting constituents.",key_prohibitions:"Using unapproved AI tools; inputting confidential or sensitive data; generating misleading content; using AI as the sole basis for final decisions without human review; violating data privacy.",key_requirements:"Approved tools only; no sensitive data in AI; human review of all outputs; disclose AI use; complete training; IT governance compliance.",high_risk_domains:"Final decision-making (prohibition on AI-only final decisions), Data privacy",equity_bias_language:"None — policy is framed entirely around information security and productivity; no equity or bias language present.",accountability:"IT governance structure; Information Security policy framework (Section 800); training requirements; disciplinary exposure implied.",bottom_line:"Monroe County's policy is the most purely IT-security-oriented in this cohort, with no equity or public-service framing. Most distinctive finding: complete absence of equity or bias language in a policy governing a full county workforce is a notable gap relative to peers — this is IT infrastructure governance, not civic AI governance."},
  {fips:"26129",county_name:"Ogemaw",state:"Michigan",title:"Ogemaw AI Policy",url:"https://www.ocmi.us/wp-content/uploads/408_Acceptable_Use_of_AI_Policy.pdf",adoption_date:"2024-11-14",policy_type:"Ordinance / Resolution (legislatively adopted)",posture:"Permissive with guardrails",posture_notes:"Board resolution formally adopts the policy; employees may use AI for productivity and efficiency within defined guardrails including data restrictions, human review, and disclosure.",coverage:"Covers county employees. No explicit mention of resident-facing services or automated decisions affecting constituents; rural county with internal workforce focus.",key_prohibitions:"Inputting confidential county information into AI; using AI to make binding decisions without human review; violating data privacy; prohibited uses enforced through disciplinary action.",key_requirements:"Must not input confidential data; human review before binding decisions; verify AI output accuracy; disclose AI use; violations result in disciplinary action.",high_risk_domains:"Binding decisions (prohibition on AI-only binding decisions)",equity_bias_language:"None — no equity, bias, or fairness language in available text.",accountability:"Board resolution adoption provides legislative accountability; disciplinary action explicitly stated for violations — one of the clearest explicit enforcement mechanisms in this cohort.",bottom_line:"Ogemaw is a small rural Michigan county whose policy is distinctive for being formally adopted by Board resolution (giving it legislative weight) and explicitly naming disciplinary action for violations. Most distinctive finding: legislative adoption combined with explicit enforcement consequences makes this the most formally enforceable internal policy in the Michigan group, despite the small county context."},
  {fips:"27163",county_name:"Washington",state:"Minnesota",title:"Washington AI Policy",url:"https://www.washingtoncountymn.gov/DocumentCenter/View/78486",adoption_date:"not listed",policy_type:"IT Policy",posture:"Permissive with guardrails",posture_notes:"Policy explicitly frames itself as 'comprehensive, yet flexible' — designed to enable AI use while managing risk; approved tools, data classification, human oversight, and vendor requirements apply.",coverage:"Covers county employees and systems used on behalf of the county. Equity considerations for public-serving AI explicitly mentioned — coverage extends to resident-facing services and constituent-impact decisions.",key_prohibitions:"Using unapproved tools; inputting data beyond approved classification levels; deploying public-serving AI without equity review.",key_requirements:"Approved tools process; data classification and tiered protection; human oversight; transparency; vendor requirements; training; incident reporting; equity considerations for public-serving AI.",high_risk_domains:"Public-serving AI (equity considerations explicitly triggered), Vendor-supplied AI systems",equity_bias_language:"Equity considerations explicitly required for public-serving AI — directly connecting the policy to constituent impact rather than limiting it to internal workforce use.",accountability:"IT Policy governance structure; incident reporting requirement; vendor oversight; training program.",bottom_line:"Washington County, Minnesota stands out for explicitly scoping equity considerations to public-serving AI — directly connecting the policy to constituent impact. Most distinctive finding: the explicit equity requirement for public-serving AI is the most meaningful constituent-protection provision in this cohort."},
  {fips:"30063",county_name:"Missoula",state:"Montana",title:"Missoula AI Policy",url:"https://www.missoulacounty.gov/media/mvodmhzi/artificial-intelligence-policy-1.pdf",adoption_date:"2025-07-08",policy_type:"Administrative / Executive Policy",posture:"Permissive with guardrails",posture_notes:"Structured governance approach enabling AI use across county operations; approved tools, data privacy, human oversight, equity and bias assessment, and incident reporting together form a layered guardrail system.",coverage:"Covers all county employees, contractors, and volunteers — broadest workforce scope. Equity and bias assessment provisions and transparency requirements indicate coverage of resident-facing services and constituent-impact decisions.",key_prohibitions:"Inputting private or sensitive data into AI; deploying AI without approved tools process; using AI without human oversight.",key_requirements:"Approved tools process; data privacy compliance; human oversight; transparency; equity and bias assessment; vendor requirements; training; incident reporting.",high_risk_domains:"Equity and bias assessment explicitly required, Vendor-supplied AI, Public-facing applications",equity_bias_language:"Explicit equity and bias assessment requirement — goes beyond a values statement to require active assessment, though methodology details are not provided. Most substantive equity provision in this cohort.",accountability:"County Administration governance; incident reporting mechanism; vendor requirements; training; values of accountability, fairness, and transparency formally stated.",bottom_line:"Missoula County combines explicit equity and bias assessment requirements with incident reporting, vendor oversight, and volunteer coverage — the most comprehensive governance structure in the Montana/Mountain West group. Most distinctive finding: active equity and bias assessment requirement makes this the most substantively equity-forward policy in the set."},

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Merge: saved overrides seed for known fips
      const map = new Map(saved.map(p => [p.fips, p]));
      db = SEED_DATA.map(s => map.has(s.fips) ? {...s, ...map.get(s.fips)} : {...s});
      // Add any saved entries not in seed
      saved.forEach(p => { if (!db.find(d => d.fips === p.fips)) db.push(p); });
    } else {
      db = SEED_DATA.map(s => ({...s}));
    }
  } catch(e) { db = SEED_DATA.map(s => ({...s})); }
}

function saveDB() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

function getPolicyByFips(fips) { return db.find(p => p.fips === fips); }

// ─── UTILS ────────────────────────────────────────────────────────────────────
function blindSpotScore(p) {
  if (!p.posture) return null; // not analyzed yet
  let s = 0;
  if (residentFacingTier(p) === 'Employee-only') s++;
  if (!p.equity_bias_language || p.equity_bias_language.toLowerCase() === 'none' || p.equity_bias_language.trim() === '') s++;
  if (!p.high_risk_domains || p.high_risk_domains.trim() === '') s++;
  const acc = (p.accountability||'').toLowerCase();
  if (!acc.includes('public') && !acc.includes('audit') && !acc.includes('website') && !acc.includes('disclos')) s++;
  const hasOversight = acc.includes('board') || acc.includes('committee') || acc.includes('oversight') || acc.includes('review') || acc.includes('task');
  if (!hasOversight) s++;
  return Math.min(s, 5);
}
